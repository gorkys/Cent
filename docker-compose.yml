x-postgres-shared-env: &postgres-shared-env
  POSTGRES_USER: ${POSTGRES_USER:-cent}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      <<: *postgres-shared-env
      POSTGRES_DB: ${POSTGRES_DATABASE:-cent}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    image: ${CENT_API_IMAGE:-gorkys/cent-api:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_API_AUTH_SECRET: ${POSTGRES_API_AUTH_SECRET:-change-me-before-production-deploy}
      POSTGRES_HOST: postgres
      <<: *postgres-shared-env
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-cent}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3459/api/postgres/health').then((response)=>{if(!response.ok)process.exit(1);}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    image: ${CENT_WEB_IMAGE:-gorkys/cent:latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3458}:80"

volumes:
  postgres-data:
