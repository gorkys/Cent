x-postgres-shared-env: &postgres-shared-env
  POSTGRES_USER: ${POSTGRES_USER:-cent}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      <<: *postgres-shared-env
      POSTGRES_DB: ${POSTGRES_DATABASE:-cent}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_API_HOST: 0.0.0.0
      POSTGRES_API_PORT: 8787
      POSTGRES_API_AUTH_SECRET: ${POSTGRES_API_AUTH_SECRET:-change-me-before-production-deploy}
      POSTGRES_API_CORS_ORIGIN: ${POSTGRES_API_CORS_ORIGIN:-http://localhost:8080}
      POSTGRES_API_PUBLIC_BASE_URL: ${POSTGRES_API_PUBLIC_BASE_URL:-}
      POSTGRES_API_BODY_LIMIT_MB: ${POSTGRES_API_BODY_LIMIT_MB:-15}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      <<: *postgres-shared-env
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-cent}
      POSTGRES_CONNECTION_LIMIT: ${POSTGRES_CONNECTION_LIMIT:-10}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/api/postgres/health').then((response)=>{if(!response.ok)process.exit(1);}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_GTAG_SCRIPT: ${VITE_GTAG_SCRIPT:-}
        VITE_LOGIN_API_HOST: ${VITE_LOGIN_API_HOST:-http://localhost}
        VITE_POSTGRES_API_HOST: ${VITE_POSTGRES_API_HOST:-/api/postgres}
        VITE_POSTGRES_PROXY_TARGET: ${VITE_POSTGRES_PROXY_TARGET:-http://127.0.0.1:8787}
        VITE_RATE_API_HOST: ${VITE_RATE_API_HOST:-http://localhost}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  postgres-data:
